name: Solace CI

on:
  push:
    branches: [master, solace, dev]
  pull_request:
    branches: [master, solace]

jobs:

  # ── Lint: bash syntax + Python compile check ─────────────────────────────
  lint:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Bash syntax check
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" && echo "OK  $f" || { echo "FAIL $f"; exit 1; }
          done

      - name: Python syntax check
        run: |
          for f in scripts/*.py; do
            python3 -m py_compile "$f" && echo "OK  $f" || { echo "FAIL $f"; exit 1; }
          done

  # ── Build matrix: x86-64 baseline + AVX2 ────────────────────────────────
  build:
    name: Build ${{ matrix.arch }} (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            compiler: g++
            comp: gcc
          - arch: x86-64-avx2
            compiler: g++
            comp: gcc
          - arch: x86-64
            compiler: clang++
            comp: clang

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install compilers
        run: |
          sudo apt-get update -q
          sudo apt-get install -y g++ clang

      - name: Build Solace (${{ matrix.arch }})
        working-directory: src
        run: |
          make objclean 2>/dev/null || true
          EXTRACXXFLAGS="-DNNUE_EMBEDDING_OFF" \
            make ARCH=${{ matrix.arch }} \
                 COMP=${{ matrix.comp }} \
                 CXX=${{ matrix.compiler }} \
                 EXE=solace \
                 -j$(nproc) 2>&1

      - name: Verify UCI identity
        working-directory: src
        run: |
          output=$(printf 'uci\nquit\n' | ./solace 2>&1)
          echo "$output"
          echo "$output" | grep -q "^id name Solace" || { echo "FAIL: engine name not Solace"; exit 1; }
          echo "$output" | grep -q "^uciok"          || { echo "FAIL: no uciok";               exit 1; }
          echo "$output" | grep -q "SolaceAggressionMode"  || { echo "FAIL: SolaceAggressionMode missing"; exit 1; }
          echo "$output" | grep -q "SolaceAggressionLevel" || { echo "FAIL: SolaceAggressionLevel missing"; exit 1; }
          echo "$output" | grep -q "SolaceAggressionNet"   || { echo "FAIL: SolaceAggressionNet missing";   exit 1; }
          echo "UCI identity: PASS"

      - name: Bench smoke (no nets — identity + options only)
        working-directory: ..
        run: |
          bash scripts/solace_bench.sh src/solace /tmp/bench_logs 2>&1
          cat /tmp/bench_logs/bench_*.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['uciok'] == 1,          f\"uciok={d['uciok']}\"
          assert d['solace_options_ok'] == 1, 'solace_options_ok=0'
          assert d['id_name'].startswith('Solace'), f\"id_name={d['id_name']}\"
          print('Bench smoke: PASS')
          "

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: solace-${{ matrix.arch }}-${{ matrix.compiler }}
          path: src/solace
          if-no-files-found: error

  # ── Aggression mode setoption regression ─────────────────────────────────
  aggression-options:
    name: Aggression option round-trip
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install g++
        run: sudo apt-get install -y g++

      - name: Build
        working-directory: src
        run: |
          EXTRACXXFLAGS="-DNNUE_EMBEDDING_OFF" make ARCH=x86-64 EXE=solace -j$(nproc)

      - name: Param mode round-trip
        working-directory: src
        run: |
          out=$(printf 'uci\nsetoption name SolaceAggressionMode value Param\nsetoption name SolaceAggressionLevel value 80\nsetoption name SolaceAggressionMode value Off\nquit\n' | ./solace 2>&1)
          echo "$out" | grep -q "uciok" || exit 1
          echo "Param round-trip: PASS"

      - name: NNUE mode with nonexistent net (graceful failure)
        working-directory: src
        run: |
          out=$(printf 'uci\nsetoption name SolaceAggressionMode value NNUE\nsetoption name SolaceAggressionNet value /nonexistent.nnue\nquit\n' | ./solace 2>&1)
          echo "$out" | grep -q "uciok" || { echo "FAIL: engine crashed on bad net path"; exit 1; }
          echo "NNUE graceful-fail: PASS"

  # ── Bench signature regression ───────────────────────────────────────────
  # Captures the bench node count in mode=Off (baseline-identical).
  # When SOLACE_BIG_NET / SOLACE_SMALL_NET secrets are set in the repo, the
  # signature is compared against the pinned value in tests/solace_bench_sig.txt.
  # Without nets the job exits 0 (SKIP) so CI still passes on fork builds.
  bench-signature:
    name: Bench signature
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install g++
        run: sudo apt-get install -y g++

      - name: Build
        working-directory: src
        run: |
          EXTRACXXFLAGS="-DNNUE_EMBEDDING_OFF" make ARCH=x86-64 EXE=solace -j$(nproc)

      - name: Run signature (nets via secrets, skipped if absent)
        env:
          SOLACE_BIG_NET:   ${{ secrets.SOLACE_BIG_NET_PATH }}
          SOLACE_SMALL_NET: ${{ secrets.SOLACE_SMALL_NET_PATH }}
        run: |
          chmod +x tests/solace_signature.sh
          # Exit 2 = SKIP is treated as success (no nets in CI)
          bash tests/solace_signature.sh src/solace || CODE=$?
          if [[ "${CODE:-0}" -eq 2 ]]; then
            echo "Bench signature: SKIPPED (no nets)"
            exit 0
          fi
          if [[ "${CODE:-0}" -ne 0 ]]; then exit "${CODE:-1}"; fi

      - name: Compare against pinned signature (if file exists and nets present)
        env:
          SOLACE_BIG_NET:   ${{ secrets.SOLACE_BIG_NET_PATH }}
          SOLACE_SMALL_NET: ${{ secrets.SOLACE_SMALL_NET_PATH }}
        run: |
          SIG_FILE="tests/solace_bench_sig.txt"
          if [[ ! -f "$SIG_FILE" ]]; then
            echo "No pinned signature file — skipping comparison."
            exit 0
          fi
          REFERENCE="$(cat $SIG_FILE)"
          bash tests/solace_signature.sh src/solace "$REFERENCE" || CODE=$?
          if [[ "${CODE:-0}" -eq 2 ]]; then exit 0; fi
          exit "${CODE:-0}"

  # ── Perft regression (requires net — skipped in no-net CI) ───────────────
  # Uncomment and add net secrets when nets are available in your repo:
  # perft:
  #   name: Perft regression
  #   runs-on: ubuntu-latest
  #   needs: build
  #   steps:
  #     ...
  #     - name: Perft 5 = 4865609
  #       run: |
  #         bash scripts/solace_bench.sh src/solace logs/ $BIG_NET $SMALL_NET
  #         python3 -c "
  #         import json; d=json.load(open('logs/bench_*.json'))
  #         assert d['perft5_status']=='PASS', d['perft5_status']
  #         "

  # ── Python unit tests for scripts ────────────────────────────────────────
  script-tests:
    name: Script unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Test analyze_match.py (synthetic W/D/L)
        run: |
          python3 - << 'EOF'
          import json, subprocess, sys, tempfile, pathlib
          match = {
            "timestamp": "20260223T000000Z",
            "solace_bin": "/bin/solace", "ref_bin": "/bin/sf",
            "aggr_mode": "Param", "tc": "10+0.1",
            "wins": 78, "draws": 92, "losses": 30, "total_played": 200
          }
          with tempfile.NamedTemporaryFile(suffix=".json", mode="w", delete=False) as f:
            json.dump(match, f); fname = f.name
          r = subprocess.run(
            ["python3", "scripts/analyze_match.py", fname, "--json"],
            capture_output=True, text=True)
          assert r.returncode == 0, f"exit={r.returncode} stderr={r.stderr}"
          d = json.loads(r.stdout)
          assert d["beats_ref"] == True,          f"beats_ref={d['beats_ref']}"
          assert d["elo_diff"]  > 50,             f"elo={d['elo_diff']}"
          assert d["los_pct"]   >= 99.9,          f"los={d['los_pct']}"
          assert 40 < d["ci_lo"] < d["ci_hi"],   f"ci={d['ci_lo']},{d['ci_hi']}"
          print("analyze_match: PASS  Δelo=", d["elo_diff"], " LOS=", d["los_pct"])
          EOF

      - name: Test parse_aggression_log.py (synthetic lines)
        run: |
          echo "info string solace_aggr total_moves 5000 sacrifices 42 sac_per_1k 8 king_attacks 310 king_per_1k 62 draw_vicinity 120 aggr_level 75" \
          | python3 scripts/parse_aggression_log.py --json \
          | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['samples']    == 1
          assert d['sacrifices'] == 42
          assert d['sac_per_1k'] == 8.4
          print('parse_aggression_log: PASS')
          "

      - name: Test fetch_aggressive_games.py ECO filter
        run: |
          python3 - << 'EOF'
          import sys
          sys.path.insert(0, 'scripts')
          import fetch_aggressive_games as f
          assert     f.eco_is_aggressive("B70"), "B70 should be aggressive (Dragon)"
          assert     f.eco_is_aggressive("C33"), "C33 should be aggressive (King's Gambit)"
          assert     f.eco_is_aggressive("E60"), "E60 should be aggressive (King's Indian)"
          assert not f.eco_is_aggressive("D20"), "D20 should not be aggressive"
          assert not f.eco_is_aggressive("A10"), "A10 should not be aggressive"
          print("ECO filter: PASS")
          EOF
